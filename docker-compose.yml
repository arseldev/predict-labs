version: '3.8'

services:
  predictor:
    build: .
    container_name: btc-predictor-prod
    restart: unless-stopped
    # Load environment variables from the local .env file
    env_file:
      - .env
    volumes:
      # Persist data, logs, and models on the host machine to keep container sizes small
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    # Limit resources to prevent high storage/RAM consumption on the server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
